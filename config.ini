[wan]
# The interface facing the ISP (upstream)
interface = eth0

# Each [lan] or [lan.NAME] section defines a downstream interface.
# Every section gets its own /64 carved from the delegated prefix.
# The subnet_index must be unique across all LAN sections.

[lan.0]
# First downstream network
interface = eth1
subnet_index = 0

[lan.1]
# Second downstream network (example: IoT VLAN)
interface = eth2
subnet_index = 1

[lan.2]
# Third downstream network (example: guest WiFi)
interface = wlan0
subnet_index = 2

[dhcpv6]
# Prefix length to request from the ISP via DHCPv6-PD
prefix_length = 56
# Identity Association ID for the prefix delegation
iaid = 1
# Retransmit timeout in seconds for DHCPv6 messages
retransmit_timeout = 5
# Maximum number of retransmit attempts before restarting
max_retransmit = 10

[ra]
# Router Advertisement interval in seconds
interval = 30
# Router lifetime advertised to clients (seconds, 0 = not default router)
router_lifetime = 1800
# Prefix valid lifetime in seconds
valid_lifetime = 86400
# Prefix preferred lifetime in seconds
preferred_lifetime = 14400
# MTU to advertise (0 = don't include MTU option)
mtu = 0
# Current hop limit to advertise
hop_limit = 64
